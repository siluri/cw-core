name: Trigger Visual Regression Tests

on:
  push:
    tags:
      - 'release/cw-core/v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to test (e.g. release/cw-core/v0.4.6-alpha)'
        required: true

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch to cw-visual-tests
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.VISUAL_TESTS_PAT }}
          repository: siluri/cw-visual-tests
          event-type: cw-core-visual-test
          client-payload: |
            {
              "tag": "${{ github.event.inputs.tag || github.ref_name }}",
              "sha": "${{ github.sha }}"
            }
